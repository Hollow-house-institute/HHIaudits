name: Governance Checksum Validation

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  checksum:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate root checksum
        run: |
          set -e
          sha256sum -c CHECKSUMS.sha256
          echo "All checksums valid"
